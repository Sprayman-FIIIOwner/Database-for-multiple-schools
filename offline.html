<!DOCTYPE html>
<html lang="id">
<head>

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')

      }
    </script>
</head>

    <img src="icon-512.png" alt="Offline image">
    <button onclick="location.reload()" style="margin-top: 30px; background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Coba Lagi</button>
